[options]
; ==============================================================================
; Core Settings
; ==============================================================================
; Data directory where Odoo will store sessions and filestore.
; This matches the mount point for the EFS volume in odoo-task.json.
data_dir = /var/lib/odoo

; Proxy mode should be True since Odoo is behind Nginx proxy.
; This allows Odoo to read X-Forwarded-For and X-Forwarded-Proto headers.
proxy_mode = True

; ==============================================================================
; Multi-Processing (Workers)
; ==============================================================================
; The Odoo ECS container has 7552 MiB of memory and 1792 CPU units allocated.
; Setting 6 workers and 3 cron threads is safe for this memory allocation.
workers = 6
max_cron_threads = 3

; Memory Limits per worker (preventing container Out-Of-Memory kills)
; The container has 7552 MiB. With 6 workers + 3 cron = 9 processes.
; Soft limit: 1024 MiB, Hard limit: 1280 MiB
limit_memory_soft = 1073741824
limit_memory_hard = 1342177280

; Request limits
limit_request = 8192
limit_time_cpu = 90
limit_time_real = 120

; ==============================================================================
; Network & Ports
; ==============================================================================
; Main HTTP server
xmlrpc_port = 8069

; Websocket/Longpolling server
gevent_port = 8072
