[options]
; ==============================================================================
; Core Settings
; ==============================================================================
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
; Data directory where Odoo will store sessions and filestore.
; This matches the mount point for the EFS volume in odoo-task.json.
data_dir = /var/lib/odoo

; Proxy mode should be True since Odoo is behind Nginx proxy.
; This allows Odoo to read X-Forwarded-For and X-Forwarded-Proto headers.
proxy_mode = True

; ==============================================================================
; Multi-Processing (Workers)
; ==============================================================================
; The Odoo ECS container has 6912 MiB of memory and 1536 CPU units allocated.
; Setting 6 workers and 2 cron threads is safe for this memory allocation.
workers = 6
max_cron_threads = 2

; Memory Limits per worker (preventing container Out-Of-Memory kills)
; The container has 6912 MiB. With 6 workers + 2 cron = 8 processes.
; Full utilization: 6912 / 8 = 864 MiB per process.
; Soft limit: 792 MiB, Hard limit: 864 MiB
limit_memory_soft = 830472192
limit_memory_hard = 891289600

; Request limits
limit_request = 8192
limit_time_cpu = 90
limit_time_real = 120

; ==============================================================================
; Network & Ports
; ==============================================================================
; Main HTTP server
xmlrpc_port = 8069

; Websocket/Longpolling server
gevent_port = 8072
