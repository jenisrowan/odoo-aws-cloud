[options]
; ==============================================================================
; Core Settings
; ==============================================================================
; Data directory where Odoo will store sessions and filestore.
; This matches the mount point for the EFS volume in odoo-task.json.
data_dir = /var/lib/odoo

; Proxy mode should be True since Odoo is behind Nginx proxy.
; This allows Odoo to read X-Forwarded-For and X-Forwarded-Proto headers.
proxy_mode = True

; ==============================================================================
; Multi-Processing (Workers)
; ==============================================================================
; The Odoo ECS container has 3584 MB of memory and 1024 CPU units allocated.
; Setting 2 workers and 1 cron thread is safe for this memory allocation.
workers = 3
max_cron_threads = 2

; Memory Limits per worker (preventing container Out-Of-Memory kills)
; The container has 3456 MB. With 3 workers + 2 cron = 5 processes.
; Safe allocation: ~600 MB per process.
; Soft limit: 512 MB, Hard limit: 640 MB
limit_memory_soft = 536870912
limit_memory_hard = 671088640

; Request limits
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120

; ==============================================================================
; Network & Ports
; ==============================================================================
; Main HTTP server
xmlrpc_port = 8069

; Websocket/Longpolling server
gevent_port = 8072
