user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Rate limiting: 10MB zone, 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=odoo_limit:10m rate=10r/s;
    
    # Connection limiting: 10MB zone, max 10 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    keepalive_timeout 65;
    types_hash_max_size 4096;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Protect Odoo workers from slow clients
    client_body_timeout 15s; # Client shouldn't be taking more than 15s to upload data
    client_header_timeout 15s; # Max time for the client to send the request headers
    send_timeout 90s; # 90s limit on client response (we set it to max odoo CPU limit)

    # Upload protection
    client_max_body_size 100m;
    client_body_buffer_size 128k;

    # Request buffering (important)
    proxy_request_buffering on;
    proxy_buffering on;

    proxy_buffers 16 16k;
    proxy_buffer_size 32k;

    # Limit header sizes
    large_client_header_buffers 4 16k;

    # Upstream Odoo server
    # Because of awsvpc we give localport instead of container specific odoo
    upstream odoo_backend {
        server 127.0.0.1:8069;
        keepalive 32;
    }

    upstream odoo_gevent {
        server 127.0.0.1:8072;
    }

    server {
        listen 80;
        server_name _;

        # Tell Nginx to trust the Docker/ALB routing
        set_real_ip_from 0.0.0.0/0; 
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # websocket
        location /websocket {
            # Apply rate limiting
            limit_req zone=odoo_limit burst=5 nodelay;
            limit_req_status 429;

            # Apply connection limiting
            limit_conn addr_limit 10;
            limit_conn_status 429;

            proxy_pass http://odoo_gevent;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Pass the ALB's original protocol
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_read_timeout 720s;
        }

        # Main Odoo application
        location / {
            # Apply rate limiting
            limit_req zone=odoo_limit burst=5 nodelay;
            limit_req_status 429;

            # Apply connection limiting
            limit_conn addr_limit 10;
            limit_conn_status 429;

            proxy_pass http://odoo_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Pass the ALB's original protocol
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            proxy_redirect off;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
        }
    }
}
