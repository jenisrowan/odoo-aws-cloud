name: Deploy Odoo to AWS via Terraform

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ODOO_ECR_REPOSITORY: odoo-custom
  NGINX_ECR_REPOSITORY: nginx-custom

# Added id-token: write here, which is required for OIDC!
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push Odoo image
      id: build-odoo
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ODOO_ECR_REPOSITORY:$IMAGE_TAG -f templates/Dockerfile.odoo templates/
        docker push $ECR_REGISTRY/$ODOO_ECR_REPOSITORY:$IMAGE_TAG
        echo "odoo_image=$ECR_REGISTRY/$ODOO_ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Build, tag, and push Nginx image
      id: build-nginx
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$NGINX_ECR_REPOSITORY:$IMAGE_TAG -f templates/Dockerfile.nginx templates/
        docker push $ECR_REGISTRY/$NGINX_ECR_REPOSITORY:$IMAGE_TAG
        echo "nginx_image=$ECR_REGISTRY/$NGINX_ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      env:
        # Pass your sensitive Terraform variables from GitHub Secrets
        TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        TF_VAR_ecs_ami: ${{ secrets.TF_VAR_ECS_AMI }}
      run: |
        terraform apply -auto-approve \
          -var="odoo_image_url=${{ env.odoo_image }}" \
          -var="nginx_image_url=${{ env.nginx_image }}"
