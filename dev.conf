[options]
; ==============================================================================
; Core Settings
; ==============================================================================
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo
admin_passwd = admin

; ==============================================================================
; Database Settings
; ==============================================================================
db_host = db
db_user = odoo
db_password = odoo
db_port = 5432

; ==============================================================================
; Local Development Optimizations
; ==============================================================================
workers = 0
max_cron_threads = 1
log_handler = [':INFO']
log_level = info

; Allow XML changes to be reloaded (requires -u module_name)
dev_mode = reload,qweb,sql,werkzeug
